<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="referrer" content="no-referrer-when-downgrade">
<title>Voynich PUM/VSM Interpreter</title>
<style>
:root{ --bg:#07111f;--card:#111827;--soft:#1f2937;--text:#e5e7eb;--accent:#38bdf8;--green:#00ffaa;--danger:#f87171; }
body{ margin:0; font-family:Arial,sans-serif; background:#07111f; color:var(--text); }
header{ padding:40px; text-align:center; background:rgba(0,0,0,0.3); }
main{ max-width:1200px; margin:auto; padding:20px; }
section{ background:var(--card); border:1px solid #334155; border-radius:15px; padding:20px; margin-bottom:20px; }
.grid{ display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
.image-wrap{ width:100%; height:500px; overflow:auto; background:#000; border-radius:10px; display:flex; align-items:center; justify-content:center; border:2px solid #334155; }
#folioImage{ max-width:100%; transition: transform 0.2s; }
textarea{ width:100%; height:150px; background:#020617; color:#00ffaa; border:1px solid #475569; border-radius:8px; padding:10px; font-family: monospace; }
button, select{ padding:10px 15px; border-radius:8px; border:none; cursor:pointer; font-weight:bold; background:var(--accent); margin-right:5px; }
.controls{ margin-bottom:15px; }
h2, h3{ color:var(--accent); margin-top:0; }
@media(max-width:800px){ .grid{ grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>Voynich PUM/VSM Interpreter</h1>
  <p>Tomasz Grabowski (Drako) & AI Collaboration</p>
</header>

<main>
  <section>
    <div class="grid">
      <div>
        <h3>Folio Selector</h3>
        <div class="controls">
          <select id="folioSelector"></select>
          <button id="loadBtn">Load Folio</button>
        </div>
        
        <div class="image-wrap" id="imageContainer">
          <img id="folioImage" src="" style="display:none;">
          <div id="imgStatus">Select a folio and press Load</div>
        </div>
        
        <div class="controls" style="margin-top:10px;">
          <button onclick="adjustZoom(0.2)">+ Zoom</button>
          <button onclick="adjustZoom(-0.2)">- Zoom</button>
          <button onclick="resetZoom()">Reset</button>
        </div>
      </div>

      <div>
        <h3>EVA Input</h3>
        <textarea id="evaInput" placeholder="EVA text will appear here..."></textarea>
        <button id="translateBtn" style="width:100%; margin-top:10px; background:var(--green); color:#000;">Run PUM/VSM Interpretation</button>
        
        <h3 style="margin-top:20px;">Interpretation Result</h3>
        <div id="output" style="background:#020617; padding:15px; border-radius:10px; min-height:200px; white-space:pre-wrap; border:1px solid #334155;"></div>
      </div>
    </div>
  </section>
</main>

<script>
const YALE_BASE = "https://iiif.library.yale.edu/iiif/2/digcoll:2002046/";
let currentZoom = 1;

const FOLIO_DB = {
  "f1r": { img: "1006195", context: "plant", eva: "qokedy qokedy chedy chedy shol shol aiin qokedy chedy shor kair ol aiin" },
  "f8r": { img: "1006209", context: "plant", eva: "qokedy chedy kair shol aiin ol dy" },
  "f78r": { img: "1006349", context: "process", eva: "qokedy chedy shol shor kair aiin kair shor chedy ol aiin" }
};

// Inicjalizacja listy
const sel = document.getElementById('folioSelector');
for(let i=1; i<=116; i++) {
  ['r','v'].forEach(side => {
    let id = `f${i}${side}`;
    let opt = document.createElement('option');
    opt.value = id;
    opt.textContent = FOLIO_DB[id] ? `${id} (Data Ready)` : id;
    sel.appendChild(opt);
  });
}

function loadFolio() {
  const id = sel.value;
  const data = FOLIO_DB[id];
  const img = document.getElementById('folioImage');
  const status = document.getElementById('imgStatus');
  const eva = document.getElementById('evaInput');

  if(data) {
    status.style.display = 'none';
    img.style.display = 'block';
    // Omijamy cache i wymuszamy przeładowanie linku IIIF
    img.src = `${YALE_BASE}${data.img}/full/1000,/0/default.jpg`;
    eva.value = data.eva;
    resetZoom();
  } else {
    img.style.display = 'none';
    status.style.display = 'block';
    status.textContent = `No local data for ${id}. You can paste EVA manually.`;
    eva.value = "";
  }
}

function adjustZoom(delta) {
  currentZoom = Math.max(0.5, Math.min(3, currentZoom + delta));
  document.getElementById('folioImage').style.transform = `scale(${currentZoom})`;
}

function resetZoom() {
  currentZoom = 1;
  document.getElementById('folioImage').style.transform = `scale(1)`;
}

document.getElementById('loadBtn').onclick = loadFolio;
document.getElementById('translateBtn').onclick = () => {
  const text = document.getElementById('evaInput').value;
  document.getElementById('output').textContent = "PUM/VSM Analysis in progress...\n\n" + 
    text.split(' ').map((word, i) => `${i+1}. ${word} -> Interpreting...`).join('\n');
};
</script>
</body>
</html>
