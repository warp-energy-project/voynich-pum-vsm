<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Voynich PUM/VSM Interpreter</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #eee;
    padding: 30px;
}

h1 { color: #00ffaa; }

textarea {
    width: 100%;
    height: 120px;
    font-size: 16px;
    padding: 10px;
    margin-top: 10px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #00ffaa;
    border: none;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #222;
}
</style>
</head>

<body>

<h1>Voynich Interpreter (PUM/VSM)</h1>

<p>
Wpisz tekst Voynicha (EVA):
</p>

<textarea id="input"></textarea>

<br>

<select id="lang">
<option value="pl">Polski</option>
<option value="en">English</option>
</select>

<br>

<button onclick="interpret()">Interpretuj</button>

<div class="result" id="output"></div>

<hr>

<h2>Model</h2>
<p>
Tekst nie jest tłumaczony językowo.  
To interpretacja funkcjonalna oparta na modelu PUM/VSM.
</p>

<h2>Autor</h2>
<p>
Tomasz Grabowski (Drako)  
Analiza wspierana narzędziami AI
</p>

<script>

const dict = {
    sh: {pl: "stan lekki", en: "light state"},
    cth: {pl: "operacja ciężka", en: "heavy operation"},
    chedy: {pl: "wynik", en: "result"},
    aiin: {pl: "zakończenie", en: "termination"},
    kair: {pl: "obiekt/nośnik", en: "object/carrier"},
    shol: {pl: "utrzymanie procesu", en: "process continuation"}
};

function interpret() {
    let text = document.getElementById("input").value.toLowerCase();
    let lang = document.getElementById("lang").value;

    let tokens = text.split(" ");
    let result = [];

    tokens.forEach(t => {
        let found = "nieznane";

        for (let key in dict) {
            if (t.includes(key)) {
                found = dict[key][lang];
            }
        }

        result.push(found);
    });

    document.getElementById("output").innerHTML =
        result.join(" → ");
}

</script>

</body>
</html>
