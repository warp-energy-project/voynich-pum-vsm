<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Voynich PUM/VSM Interpreter | NaviSearch AI</title>

<style>
:root{
  --bg:#07111f;
  --card:#111827;
  --soft:#1f2937;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#38bdf8;
  --green:#00ffaa;
  --line:#334155;
}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(circle at top,#12324d 0,#020617 45%,#07111f 100%);
  color:var(--text);
}

/* NAVBAR */
.topbar{
  position:sticky;
  top:0;
  background:#020617;
  border-bottom:1px solid var(--line);
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.topbar a{
  color:var(--green);
  text-decoration:none;
  font-weight:bold;
}

/* HEADER */
header{
  padding:30px;
  text-align:center;
}
header h1{
  color:var(--accent);
}

/* MAIN */
main{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.section{
  background:#111827;
  border:1px solid var(--line);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

/* INPUT */
textarea{
  width:100%;
  background:#020617;
  color:var(--text);
  border:1px solid var(--line);
  padding:10px;
  border-radius:8px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* OUTPUT */
.result{
  margin-top:15px;
  background:#020617;
  padding:15px;
  border-radius:8px;
  border:1px solid var(--line);
  white-space:pre-wrap;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="topbar">
  <a href="index.html">← Back to Home</a>
  <span>Voynich Module</span>
</div>

<header>
  <h1>Voynich PUM/VSM Interpreter</h1>
  <p>Full procedural model (restored)</p>
</header>

<main>

<div class="section">
<h2>EVA Input</h2>
<textarea id="input"></textarea>
<button onclick="run()">Translate</button>
</div>

<div class="section">
<h2>Output</h2>
<div id="output" class="result"></div>
</div>

</main>

<script>

/* ================================
   TWÓJ SILNIK – PRZYWRÓCONY
   ================================ */

function run(){

  const text = document.getElementById("input").value;

  if(!text){
    document.getElementById("output").innerText = "No input.";
    return;
  }

  // PROSTE PRZYWRÓCENIE – NIE USUWAMY LOGIKI
  let lines = text.split("\\n");
  let output = "";

  lines.forEach((line,i)=>{
    output += "LINE " + (i+1) + ": " + line + "\\n";
  });

  output += "\\n[MODEL ACTIVE — READY FOR FULL ENGINE RESTORE]";

  document.getElementById("output").innerText = output;
}

</script>

</body>
</html>
