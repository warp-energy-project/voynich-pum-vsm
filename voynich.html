<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voynich Viewer</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:#fff;
    font-family:system-ui;
}

.viewer{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    height:80vh;
    align-items:center;
    gap:40px;
    padding:20px;
}

.viewer::-webkit-scrollbar{display:none;}

.viewer img{
    height:100%;
    scroll-snap-align:center;
    object-fit:contain;
    background:#fdfbf7;
    box-shadow:0 5px 25px rgba(0,0,0,.5);
}

.bar{
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
}

button{
    padding:10px 20px;
    background:#222;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Voynich Manuscript Viewer</h2>

<div id="viewer" class="viewer"></div>

<div class="bar">
<button onclick="move(-1)">◀</button>
<span id="page">1 / 214</span>
<button onclick="move(1)">▶</button>
</div>

<script>
const viewer = document.getElementById('viewer');
const label = document.getElementById('page');
const total = 214;

for(let i=1;i<=total;i++){
    const num = String(i).padStart(3,'0');
    const img = document.createElement('img');
    img.src = 'assets/voynich/pages/page-' + num + '.jpg';
    viewer.appendChild(img);
}

viewer.addEventListener('scroll', ()=>{
    const current = Math.round(viewer.scrollLeft / viewer.clientWidth) + 1;
    if(current>0 && current<=total){
        label.innerText = current + ' / ' + total;
    }
});

function move(dir){
    viewer.scrollBy({left: viewer.clientWidth * dir, behavior:'smooth'});
}
</script>

</body>
</html>
